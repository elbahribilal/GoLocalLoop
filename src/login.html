<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../dist/login_register.css">
    <title>Sign In</title>
</head>
<body>
    <div class=" container">
        <div class="header">
            <h2>Sign In</h2>
            <p>
               Don't have an Account
                <a href="register.html">Sign up</a>
            </p>
        </div>

        <form class="form" id="loginForm">
            <div class="error-message" id="errorMessage"></div>

            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-wrapper">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        placeholder="Email"
                    />
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper password-field">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm6-10V7a3 3 0 00-3-3H9a3 3 0 00-3 3v4h12V7z" />
                    </svg>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        placeholder="Enter your Password"
                    />
                    
                </div>
            </div>

            <div class="checkbox-wrapper">
                <div class="checkbox-group">
                    <input type="checkbox" id="rememberMe" name="rememberMe" />
                    <label for="rememberMe">remember Me</label>
                </div>
                <a href="#" class="forgot-password">Forgot password ?</a>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Login</button>

            
        </form>
    </div>

        

</body>
</html>
