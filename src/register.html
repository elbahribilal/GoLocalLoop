<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../dist/login_register.css">
    <title>Sign Up</title>
</head>
<body>
    

        <div class="container">
        <div class="header">
            <h2>Sign Up</h2>
            <p>
               Already have an Account
                <a href="login.html">Sign in</a>
            </p>
        </div>

        <form class="form" id="loginForm">
            <div class="error-message" id="errorMessage"></div>

            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    
                    <input
                        type="text"
                        id="username"
                        name="username"
                        required
                        placeholder="UserName"
                    />
                </div>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-wrapper">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        placeholder="Email"
                    />
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper password-field">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm6-10V7a3 3 0 00-3-3H9a3 3 0 00-3 3v4h12V7z" />
                    </svg>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        required
                        placeholder="Enter your Password"
                    />
                    
                </div>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrapper password-field">
                    <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm6-10V7a3 3 0 00-3-3H9a3 3 0 00-3 3v4h12V7z" />
                    </svg>
                    <input
                        type="password"
                        id="confirmPassword"
                        name="confirmPassword"
                        required
                        placeholder="Confirm your Password"
                    />
                    
                </div>
            </div>

            <div class="error hidden ">
                <p class="text-red-600 text-sm"></p>
            </div>
                

            <button type="submit" class="submit-btn" id="submitBtn">Sign Up</button>

            
        </form>
    </div>

    <script>

        const form = document.getElementById("form")
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                
                userName: document.getElementById('userName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById
                password: document.getElementById('password').value,
                confirmPassword: document.getElementById('confirmPassword').value,
                
            };

            // اchecking if paasword and confirm password are matched 
            if (formData.password !== formData.confirmPassword) {
                errorMessage.textContent = 'passwords is not matched';
                errorMessage.classList.remove('hidden');
                return;
            }
        })
    </script>
</body>
</html>
