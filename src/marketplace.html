<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="dist/home.css">

    <title>Golocaloop</title>
</head>

<body class="bbg-gray-100 text-gray-800">

    <header class="p-3 sticky top-0 z-50 bg-white flex justify-between items-center  shadow-sm gap-4">

        <div class="flex items-center gap-3">
            <button onclick="toggleMenu()"
                class="md:hidden p-2 text-gray-500 hover:bg-gray-100 rounded-lg transition-colors focus:outline-none">
                <svg xmlns="http://w3.org" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
            <a href="#" class="text-2xl font-medium"><span class="text-blue-500">Go</span>LocaLoop</a>
        </div>

        <div class="relative w-full max-w-md hidden sm:block">
            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                <svg class="w-4 h-4 text-gray-500" aria-hidden="true" xmlns="http://w3.org" fill="none"
                    viewBox="0 0 20 20">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z" />
                </svg>
            </div>
            <input type="search"
                class="block w-full p-2 pl-10 text-sm text-gray-900 border border-gray-300 rounded-lg bg-gray-50 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                placeholder="Search..." required>
        </div>

        <div class="flex gap-2 items-center">
            <button onclick="chatOpen()"
                class="relative p-2 text-gray-500 hover:bg-gray-100 rounded-full transition-colors focus:outline-none">
                <svg xmlns="http://w3.org" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                <span class="absolute top-1.5 right-1.5 hidden h-2 w-2" id="message_red_dot">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
                </span>
            </button>

            <a id="anonymousUser" href="login.html"
                class="p-2 text-gray-500 border border-gray-300 hover:bg-gray-50 hover:border-gray-400 rounded-lg transition-all focus:outline-none">
                <svg xmlns="http://w3.org" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </a>
            <a id="realUser" href="#"
                class="hidden p-2  hover:bg-gray-50 hover:border-gray-400 rounded-lg transition-all focus:outline-none">
                <div class="h-10 w-10 rounded-full bg-gray-200 border border-gray-300 overflow-hidden">

                    <img loading="lazy" loading="lazy" id="realUserImg" src="" alt="avatar">
                </div>
            </a>
        </div>
    </header>

    <main class="grid grid-cols-1  md:grid-cols-[minmax(0,300px)_2fr]  min-h-screen">

        <aside id="sidebar"
            class="fixed md:sticky md:top-[65px] left-0 z-40 w-64   h-full md:h-[calc(100vh-65px)] bg-white  transition-transform duration-300 ease-in-out -translate-x-full md:translate-x-0 shadow-lg md:shadow-none">
            <nav class="flex flex-col gap-2 p-4 pt-8 md:pt-4">
                <a href="index.html"
                    class="flex items-center gap-3 px-3 py-2 text-gray-600 rounded-lg hover:bg-gray-50 hover:text-blue-600 transition-colors group font-medium">
                    <svg xmlns="http://w3.org" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    <span class="text-sm">Home</span>
                </a>

                <a href="freelancers.html"
                    class="flex items-center gap-3 px-3 py-2 text-gray-600 rounded-lg hover:bg-gray-50 hover:text-blue-600 transition-colors group">
                    <svg xmlns="http://w3.org" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    <span class="text-sm font-medium">Freelancers</span>
                </a>
                <!-- Marketplace Link -->
                <a href="#" class="flex items-center gap-3 px-3 py-2 text-blue-600 bg-blue-50 group">
                    <svg xmlns="http://w3.org" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9h18v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"></path>
                        <path d="m3 9 2.45-4.9A2 2 0 0 1 7.24 3h9.52a2 2 0 0 1 1.8 1.1L21 9"></path>
                        <path d="M12 3v6"></path>
                    </svg>
                    <span class="text-sm font-medium">Marketplace</span>
                </a>
                <button onclick="localStorage.removeItem('currentUser'); location.reload();"
                    class="flex items-center gap-3 px-3 py-2 text-gray-600 rounded-lg hover:bg-blue-50 hover:text-blue-600 transition-colors group mb-4">
                    <svg xmlns="http://w3.org" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span class="text-sm font-medium">Logout</span>
                </button>
            </nav>
        </aside>

        <section class="p-6 w-full    flex flex-col items-center gap-3  bg-gray-100">
            <div class="w-full  h-full  flex flex-col items-center gap-3">
                <div id="feed"
                    class="w-full   grid grid-cols-1 sm:grid-cols-2 md:grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-3">
                    <div
                        class="w-[95%]   mx-auto  bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                        <!-- product header  -->
                        <div class="w-full">
                            <div class="flex items-center gap-3 p-4">
                                <div class="h-10 w-10 rounded-full bg-gray-200 border border-gray-300 overflow-hidden">
                                    <!-- Profile Image -->
                                    <img loading="lazy" loading="lazy" src="https://i.pravatar.cc/370" alt="avatar">
                                </div>
                                <div>
                                    <h3 class="text-sm font-semibold text-gray-900">Malak</h3>
                                    <p class="text-xs text-gray-500">2 hours ago</p>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-0.5 bg-gray-100 border-y border-gray-100">
                            <img loading="lazy" loading="lazy" src="https://picsum.photos/270" alt="post"
                                class="w-full h-64 object-cover">
                            <img loading="lazy" loading="lazy" src="https://picsum.photos/370" alt="post"
                                class="w-full h-64 object-cover">
                        </div>

                        <div class="px-4  pb-3">
                            <p class="text-sm max-h-10 scrt overflow-y-auto text-gray-700 leading-relaxed">
                                Check out this amazing project I just finished! #Freelance #Design
                            </p>
                            <span class="text-gray-500">see more...</span>
                        </div>
                        <div class="px-4 flex justify-end  pb-3">
                            <!-- make offer Icon Button -->
                            <button onclick="chatOpen()"
                                class="p-2  flex items-center gap-1  text-gray-500 text-sm  rounded-lg transition-all border border-blue-500 hover:bg-blue-500 hover:text-white  focus:outline-none "
                                title="Ask for details">
                                <span>Make offer</span>
                                <svg xmlns="http://w3.org" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                                </svg>
                            </button>
                        </div>

                    </div>

                </div>



                <div id="loader" style="height: 100px; text-align: center;">Loading more content...</div>

            </div>




        </section>



    </main>
    <script>
        const realUser = document.getElementById('realUser')
        const realUserImg = document.getElementById('realUserImg')
        let isLogedIn = false
        const currentUser = JSON.parse(localStorage.getItem('currentUser'))

        if (currentUser) {
            isLogedIn = true
        }
        if (isLogedIn) {
            document.getElementById('anonymousUser').classList.add("hidden")
            realUser.classList.remove("hidden")
            realUserImg.src = currentUser.profile
        }

        function chatOpen() {
            if (isLogedIn) {
                window.location.replace("chat.html")
            } else {
                window.location.replace("login.html")
            }
        }
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        }

        const times = ['hours', 'menutes', 'days', 'months']
        // here we used some js to make infinit scroll 
        function loadRandomPost() {

            posts = [
                {
                    profile: `https://i.pravatar.cc/3${Math.floor(Math.random() * 99) + 1}`,
                    username: "Abderrahim EL Yaagoubi",
                    postText: "Need help with a React project, budget is negotiable!",
                    images: [`https://picsum.photos/3${Math.floor(Math.random() * 99) + 1}`, `https://picsum.photos/3${Math.floor(Math.random() * 99) + 1}`]
                },
                {
                    profile: `https://i.pravatar.cc/3${Math.floor(Math.random() * 99) + 1}`,
                    username: "Bilal Bahri",
                    postText: "NEED HELP: Looking for a Graphic Design expert for a logo refresh. Budget: $500.",
                    images: [`https://picsum.photos/3${Math.floor(Math.random() * 99) + 1}`, `https://picsum.photos/3${Math.floor(Math.random() * 99) + 1}`]
                },
                {
                    profile: `https://i.pravatar.cc/3${Math.floor(Math.random() * 99) + 1}`,
                    username: "Yassine",
                    postText: "HIRING: Looking for a freelance SEO for long-term collaboration. DM me!",
                    images: [`https://picsum.photos/3${Math.floor(Math.random() * 99) + 1}`, `https://picsum.photos/3${Math.floor(Math.random() * 99) + 1}`]
                },
                {
                    profile: `https://i.pravatar.cc/3${Math.floor(Math.random() * 99) + 1}`,
                    username: "Marwa",
                    postText: "FREELANCER: React Developer available for new projects. Check my portfolio!",
                    images: [`https://picsum.photos/3${Math.floor(Math.random() * 99) + 1}`, `https://picsum.photos/3${Math.floor(Math.random() * 99) + 1}`]
                },
                {
                    profile: `https://i.pravatar.cc/3${Math.floor(Math.random() * 99) + 1}`,
                    username: "Anas",
                    postText: "SELLING: Professional Mechanical Keyboard. Perfect for devs. PM for details.",
                    images: [`https://picsum.photos/3${Math.floor(Math.random() * 99) + 1}`, `https://picsum.photos/3${Math.floor(Math.random() * 99) + 1}`]
                },
                {
                    profile: `https://i.pravatar.cc/3${Math.floor(Math.random() * 99) + 1}`,
                    username: "Abdelbasset",
                    postText: "FOR SALE: Selling my MacBook Pro 2021. Great condition! Asking $1200.",
                    images: [`https://picsum.photos/3${Math.floor(Math.random() * 99) + 1}`, `https://picsum.photos/3${Math.floor(Math.random() * 99) + 1}`]
                },
            ]
            return posts


        }
        function getPost() {

            post = loadRandomPost()[Math.floor(Math.random() * 6)]

            const newPost = `
        <div
                        class="w-[95%]   mx-auto  bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                        <!-- product header  -->
                        <div class="w-full">
                            <div class="flex items-center gap-3 p-4">
                                <div class="h-10 w-10 rounded-full bg-gray-200 border border-gray-300 overflow-hidden">
                                    <!-- Profile Image -->
                                    <img loading="lazy" loading="lazy" src="${post.profile}" alt="avatar">
                                </div>
                                <div>
                                    <h3 class="text-sm font-semibold text-gray-900">${post.username}</h3>
                                    <p class="text-xs text-gray-500">
                                        

                                        ${(Math.floor(Math.random() * 9) + 2) + ' ' + times[Math.floor(Math.random() * times.length)]} ago

                                        </p>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-0.5 bg-gray-100 border-y border-gray-100">
                            <img loading="lazy" loading="lazy" src="${post.images[0]}" alt="post" class="w-full h-64 object-cover">
                            <img loading="lazy" loading="lazy" src="${post.images[1]}" alt="post" class="w-full h-64 object-cover">
                        </div>

                        <div class="px-4  pb-3">
                            <p class="text-sm max-h-10 scrt overflow-y-auto text-gray-700 leading-relaxed">
                               ${post.postText}
                            </p>
                            <span class="text-gray-500">see more...</span>
                        </div>
                        <div class="px-4 flex justify-end  pb-3">
                            <!-- make offer Icon Button -->
                            <button onclick="chatOpen()"
                                class="p-2  flex items-center gap-1  text-gray-500 text-sm  rounded-lg transition-all border border-blue-500 hover:bg-blue-500 hover:text-white  focus:outline-none "
                                title="Ask for details">
                                <span>Make offer</span>
                                <svg xmlns="http://w3.org" width="20" height="20" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                                </svg>
                            </button>
                        </div>

                    </div>
    `
            feed.insertAdjacentHTML('beforeend', newPost);
        }

        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) {
                // load 3 new posts
                getPost()
                getPost()
                getPost()
            }
        }, { threshold: 1.0 });

        observer.observe(loader);



    </script>
</body>

</html>
