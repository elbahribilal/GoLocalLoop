<!DOCTYPE html>
<html lang="ar">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="dist/home.css">
  <title>chat</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #e5ddd5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 100%;
      height: 100vh;
      background: #fff;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }

    @media (min-width: 600px) {
      .chat-container {
        width: 400px;
        height: 600px;
        border-radius: 20px;
      }
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 15px;
      background: #0A18AF;
      color: white;
    }

    .header-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-info a {
      color: white;
      display: flex;
      align-items: center;
    }

    .header-info svg {
      fill: white;
      transition: transform 0.2s;
    }

    .header-info svg:hover {
      transform: scale(1.1);
    }

    .photo-profile img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid white;
    }

    .call a {
      color: white;
      display: flex;
      align-items: center;
    }

    .chat-box {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
    }

    .message {
      margin-bottom: 12px;
      padding: 12px 16px;
      border-radius: 15px;
      max-width: 75%;
      word-wrap: break-word;
      animation: fadeIn 0.3s ease;
      font-size: 15px;
      line-height: 1.4;
    }

    .user {
      background: #0A18AF;
      color: #fff;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }

    .bot {
      background: #ffffff;
      color: #333;
      margin-right: auto;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
    }

    .input-area {
      display: flex;
      padding: 12px;
      background: #fff;
      align-items: center;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 12px 20px;
      border-radius: 12px;
      border: 1px solid #ddd;
      outline: none;
      background: #f9f9f9;
      font-size: 15px;
      transition: all 0.3s ease;
    }

    .input-area input:focus {
      border-color: #0A18AF;
      background: #fff;
      box-shadow: 0 0 5px rgba(10, 24, 175, 0.2);
    }

    .input-area button {
      border: none;
      background: #0A18AF;
      color: #fff;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 18px;
      transition: background 0.3s ease, transform 0.2s;
    }

    .input-area button:hover {
      background: #08128a;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="chat-container">

    <header>
      <div class="header-info">
        <a href="index.html" title="">
          <svg viewBox="0 0 24 24" width="28" height="28">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"></path>
          </svg>
        </a>
        <div class="photo-profile">
          <img src="https://i.pravatar.cc/100?img=11" alt="profile" />
        </div>
        <h2 class="text-white text-lg font-medium p-2">GolocaLoop Bot</h2>
      </div>

      <div class="call">
        <a href="#" title="">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
            </path>
          </svg>
        </a>
      </div>
    </header>

    <div class="chat-box" id="chatBox">
      <div class="message bot">hi how are you</div>
      <div class="message bot">how was your visit to our mini web project</div>
    </div>

    <div class="input-area">
      <input type="text" id="messageInput" placeholder="type a message" dir="auto" onkeypress="handleKey(event)">

      <button onclick="sendMessage()">➤</button>
    </div>

  </div>
  <script>
    function sendMessage() {
      const input = document.getElementById("messageInput");
      const chatBox = document.getElementById("chatBox");

      if (input.value.trim() === "") return;

      const userMsg = document.createElement("div")
      userMsg.className = "message user"
      userMsg.textContent = input.value
      var message = input.value
      chatBox.appendChild(userMsg);

      chatBox.scrollTop = chatBox.scrollHeight;

      setTimeout(() => {
        const botMsg = document.createElement("div");
        botMsg.className = "message bot";
        if (message.toLowerCase().includes("hi")) {
          botMsg.textContent = "how are you"
        } else {
          botMsg.textContent = "Glad to here that , was with you GoLocalLoop Bot by Abderrahim EL Yaagoubi, Bilal Albahri, and Abdessamed";
        }
        chatBox.appendChild(botMsg);

        chatBox.scrollTop = chatBox.scrollHeight;
      }, 500);

      input.value = "";
    }

    function handleKey(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    }
  </script>
</body>

</html>
